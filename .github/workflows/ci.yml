name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: PHP syntax check (theme)
        run: php -l theme/functions.php

      - name: PHP syntax check (plugin)
        run: php -l plugin/mrdemonwolf-color-preview/mrdemonwolf-color-preview.php

      - name: Check for leftover Nexus references
        run: |
          ! grep -ri "nexus" theme/ supplementary/ --include="*.php" --include="*.css" --include="*.js" --include="*.json" --include="*.xml"

      - name: Build theme zip
        run: cd theme && zip -r ../mrdemonwolf.zip . -x "*.DS_Store"

      - name: Build plugin zip
        run: cd plugin && zip -r ../mrdemonwolf-color-preview.zip mrdemonwolf-color-preview/ -x "*.DS_Store"
